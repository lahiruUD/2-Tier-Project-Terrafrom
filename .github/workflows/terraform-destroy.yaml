name: "Terraform Destroy"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy (dev/test/prod)"
        required: true
        type: choice
        options:
          - dev
          - test
          - prod
      confirm_destroy:
        description: "Type 'destroy' to confirm"
        required: true
        type: string

env:
  TF_LOG: INFO
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

permissions:
  contents: read

jobs:
  terraform-destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Validate Confirmation
        if: github.event.inputs.confirm_destroy != 'destroy'
        run: |
          echo "ERROR: You must type 'destroy' to confirm destruction"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.13.3
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Set Environment Variables
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [[ "$ENV" == "prod" ]]; then
            echo "WORKSPACE_NAME=prod" >> $GITHUB_ENV
            echo "TF_VAR_FILE=prod.tfvars" >> $GITHUB_ENV
          elif [[ "$ENV" == "test" ]]; then
            echo "WORKSPACE_NAME=test" >> $GITHUB_ENV
            echo "TF_VAR_FILE=test.tfvars" >> $GITHUB_ENV
          else
            echo "WORKSPACE_NAME=dev" >> $GITHUB_ENV
            echo "TF_VAR_FILE=dev.tfvars" >> $GITHUB_ENV
          fi

      - name: Set Terraform Workspace
        run: echo "TF_WORKSPACE=$WORKSPACE_NAME" >> $GITHUB_ENV

      - name: Terraform Plan Destroy
        id: plan
        run: |
          terraform plan -destroy \
            -var-file=$TF_VAR_FILE \
            -no-color \
            -input=false \
            -out=tfplan-destroy
        continue-on-error: true

      - name: Terraform Plan Destroy Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Destroy
        run: terraform apply -auto-approve -input=false tfplan-destroy